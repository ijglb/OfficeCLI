name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            name: officecli-mac-arm64
            os: macos-latest
          - rid: osx-x64
            name: officecli-mac-x64
            os: macos-latest
          - rid: linux-musl-x64
            name: officecli-linux-x64
            os: ubuntu-latest
            aot: true
          # 注意: linux-arm64 仍使用 CoreCLR，若目标服务器 glibc 也过老，需类似处理
          - rid: linux-arm64
            name: officecli-linux-arm64
            os: ubuntu-latest
          - rid: win-x64
            name: officecli-win-x64.exe
            os: ubuntu-latest
          - rid: win-arm64
            name: officecli-win-arm64.exe
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki for embedded help
        run: git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git" src/officecli/wiki || echo "Wiki clone failed, using fallback help"

      - name: Verify wiki version matches csproj version
        run: |
          if [ ! -f src/officecli/wiki/version.json ]; then
            echo "::warning::Wiki not available, skipping version check"
            exit 0
          fi
          CSPROJ_VERSION=$(grep '<Version>' src/officecli/officecli.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          WIKI_VERSION=$(python3 -c "import json; print(json.load(open('src/officecli/wiki/version.json'))['version'])")
          echo "csproj: $CSPROJ_VERSION, wiki: $WIKI_VERSION"
          if [ "$WIKI_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "::error::Wiki version ($WIKI_VERSION) does not match csproj version ($CSPROJ_VERSION). Update wiki before building."
            exit 1
          fi

      - name: Setup .NET
        if: '!matrix.aot'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish
        if: '!matrix.aot'
        run: dotnet publish src/officecli/officecli.csproj -c Release -r ${{ matrix.rid }} -o publish --nologo

      # NativeAOT + musl 静态链接：产出零 glibc 依赖的二进制文件，可运行于任意 Linux x86_64
      - name: Publish (Linux AOT static)
        if: matrix.aot
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src \
            -e TARGET_RID=${{ matrix.rid }} \
            alpine:3.20 sh -c '
              set -e
              apk add --no-cache bash curl clang build-base zlib-dev zlib-static openssl-dev openssl-libs-static linux-headers
              export DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
              curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 10.0 --quality preview --install-dir /usr/share/dotnet
              export PATH="/usr/share/dotnet:$PATH"
              dotnet publish src/officecli/officecli.csproj -c Release -r "$TARGET_RID" \
                /p:PublishAot=true \
                -o publish --nologo
              echo "=== Binary verification ==="
              file publish/officecli
              ldd publish/officecli 2>&1 || true
              chmod -R a+rw publish/
            '

      - name: Rename output
        run: |
          if [ -f publish/officecli.exe ]; then
            mv publish/officecli.exe publish/${{ matrix.name }}
          else
            mv publish/officecli publish/${{ matrix.name }}
          fi

      - name: Ad-hoc codesign (macOS)
        if: startsWith(matrix.rid, 'osx-')
        run: codesign -s - -f publish/${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: publish/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
